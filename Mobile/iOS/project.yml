name: HikvisionViewerMobile
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.bgazzera.HikvisionViewerMobile
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  HikvisionViewerMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: ../../Sources/HikvisionViewer/Models
      - path: ../../Sources/HikvisionViewer/Services
        excludes:
          - AppAttentionService.swift
          - VLCLauncherService.swift
    settings:
      base:
        PRODUCT_NAME: HikvisionViewerMobile
        PRODUCT_MODULE_NAME: HikvisionViewerMobile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: HikvisionViewerMobile
        INFOPLIST_KEY_CFBundleName: HikvisionViewerMobile
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_NSMicrophoneUsageDescription: HikvisionViewerMobile uses the microphone for doorbell talkback when you answer a ring.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: HikvisionViewerMobile connects to your Hikvision NVR and doorbell on the local network.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarHidden: NO
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
  HikvisionViewerMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: HikvisionViewerMobile
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: HikvisionViewerMobileTests
        PRODUCT_MODULE_NAME: HikvisionViewerMobileTests
        PRODUCT_BUNDLE_IDENTIFIER: com.bgazzera.HikvisionViewerMobileTests
schemes:
  HikvisionViewerMobile:
    build:
      targets:
        HikvisionViewerMobile: all
        HikvisionViewerMobileTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - HikvisionViewerMobileTests
